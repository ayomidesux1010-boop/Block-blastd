<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Final</title>
    <style>
        body { background: #0b1426; color: white; font-family: Arial, sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; font-size: 24px; font-weight: bold; }
        .score-text { color: #40e0d0; }
        canvas { background: #152035; border-radius: 8px; touch-action: none; }
        
        /* Game Over & Revive Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #overlay h1 { color: #ff4d4d; font-size: 36px; margin-bottom: 10px; }
        .btn { width: 240px; padding: 16px; margin: 8px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #revive-btn { background: #22c55e; color: white; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
        #restart-btn { background: #475569; color: #cbd5e1; font-size: 14px; margin-top: 15px; }
        
        #ad-banner { position: fixed; bottom: 0; width: 100%; height: 50px; background: #000; color: #444; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="header">
        <div>BEST: <span id="best">0</span></div>
        <div class="score-text">SCORE: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="overlay">
        <h1 id="status-text">OUT OF SPACE!</h1>
        <div id="final-score" style="font-size: 22px; margin-bottom: 25px;">Score: 0</div>
        <button id="revive-btn" class="btn" onclick="revivePlayer()">REVIVE (WATCH AD)</button>
        <button id="restart-btn" class="btn" onclick="resetGame()">NO THANKS, RESTART</button>
    </div>

    <div id="ad-banner">Banner ID: ca-app-pub-9862002985603972/9278024171</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');

        let score = 0, bestScore = localStorage.getItem('bbFinalBest') || 0;
        bestEl.innerText = bestScore;

        const gridRes = 8;
        let cellSize, boardSize, boardX;
        let board = Array(gridRes).fill().map(() => Array(gridRes).fill(0));

        const COLORS = { 1: '#00d4ff', 2: '#ff2d55', 3: '#4cd964', 4: '#ffcc00', 5: '#af52de', empty: '#1e2d4a' };
        const SHAPES = [
            { map: [[1,1],[1,1]], type: 1 },
            { map: [[1,1,1,1]], type: 2 },
            { map: [[1,1,1],[0,1,0]], type: 3 },
            { map: [[1,1,1]], type: 4 },
            { map: [[1,0],[1,0],[1,1]], type: 5 }
        ];

        let dock = [], activeP = null, dragX = 0, dragY = 0;

        function init() {
            boardSize = Math.min(window.innerWidth - 30, 400);
            cellSize = boardSize / gridRes;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            boardX = (canvas.width - boardSize) / 2;
            spawnDock();
            requestAnimationFrame(gameLoop);
        }

        function spawnDock() {
            dock = [0,1,2].map(i => {
                let s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                return { ...s, x: (canvas.width/4)*(i+1) - 40, y: boardSize + 100, ox: (canvas.width/4)*(i+1) - 40, oy: boardSize + 100, active: true };
            });
            if (!canMoveAnywhere()) showGameOver();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let r=0; r<gridRes; r++) {
                for(let c=0; c<gridRes; c++) {
                    ctx.fillStyle = board[r][c] ? COLORS[board[r][c]] : COLORS.empty;
                    ctx.fillRect(boardX + c*cellSize + 2, r*cellSize + 2, cellSize - 4, cellSize - 4);
                }
            }
            dock.forEach(p => {
                if(!p.active || p === activeP) return;
                ctx.fillStyle = COLORS[p.type];
                const s = cellSize * 0.6;
                p.map.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) ctx.fillRect(p.x + ci*s, p.y + ri*s, s-2, s-2);
                }));
            });
            if (activeP) {
                ctx.fillStyle = COLORS[activeP.type];
                activeP.map.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) ctx.fillRect(activeP.x + ci*cellSize, activeP.y + ri*cellSize, cellSize-2, cellSize-2);
                }));
            }
        }

        canvas.addEventListener('touchstart', e => {
            const tx = e.touches[0].clientX, ty = e.touches[0].clientY;
            dock.forEach(p => {
                if(p.active && tx > p.x-20 && tx < p.x+80 && ty > p.y-20 && ty < p.y+80) {
                    activeP = p; dragX = tx - p.x; dragY = ty - p.y;
                }
            });
        });

        canvas.addEventListener('touchmove', e => {
            if(!activeP) return;
            e.preventDefault();
            activeP.x = e.touches[0].clientX - dragX; activeP.y = e.touches[0].clientY - dragY;
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            if(!activeP) return;
            const gc = Math.round((activeP.x - boardX) / cellSize), gr = Math.round(activeP.y / cellSize);
            if(canPlace(activeP.map, gr, gc)) {
                place(activeP.map, gr, gc, activeP.type);
                activeP.active = false;
                if(dock.every(d => !d.active)) spawnDock();
                checkLines();
                if (!canMoveAnywhere()) showGameOver();
            } else { activeP.x = activeP.ox; activeP.y = activeP.oy; }
            activeP = null;
        });

        function canPlace(map, r, c) {
            return map.every((row, ri) => row.every((v, ci) => {
                if(!v) return true;
                let nr = r + ri, nc = c + ci;
                return nr>=0 && nr<gridRes && nc>=0 && nc<gridRes && !board[nr][nc];
            }));
        }

        function place(map, r, c, type) {
            map.forEach((row, ri) => row.forEach((v, ci) => { if(v) board[r+ri][c+ci] = type; }));
            score += 10; updateScore();
        }

        function checkLines() {
            let rClear = [], cClear = [];
            for(let r=0; r<gridRes; r++) if(board[r].every(v => v !== 0)) rClear.push(r);
            for(let c=0; c<gridRes; c++) if(board.every(r => r[c] !== 0)) cClear.push(c);
            rClear.forEach(r => board[r] = Array(gridRes).fill(0));
            cClear.forEach(c => board.forEach(r => r[c] = 0));
            if(rClear.length || cClear.length) { score += (rClear.length + cClear.length) * 50; updateScore(); }
        }

        function canMoveAnywhere() {
            return dock.some(p => {
                if (!p.active) return false;
                for (let r=0; r<gridRes; r++) {
                    for (let c=0; c<gridRes; c++) {
                        if (canPlace(p.map, r, c)) return true;
                    }
                }
                return false;
            });
        }

        function showGameOver() {
            document.getElementById('final-score').innerText = "Final Score: " + score;
            overlay.style.display = 'flex';
        }

        function revivePlayer() {
            alert("Playing Ad: ca-app-pub-9862002985603972/2583481675");
            for(let r=2; r<6; r++) for(let c=2; c<6; c++) board[r][c] = 0;
            overlay.style.display = 'none';
            spawnDock();
        }

        function resetGame() {
            board = Array(gridRes).fill().map(() => Array(gridRes).fill(0));
            score = 0; scoreEl.innerText = 0;
            overlay.style.display = 'none';
            spawnDock();
        }

        function updateScore() {
            scoreEl.innerText = score;
            if(score > bestScore) {
                bestScore = score; bestEl.innerText = bestScore;
                localStorage.setItem('bbFinalBest', bestScore);
            }
        }

        function gameLoop() { draw(); requestAnimationFrame(gameLoop); }
        init();
    </script>
</body>
</html>
