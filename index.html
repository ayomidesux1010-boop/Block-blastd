<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Block Blast Clone Pro</title>
    <style>
        body { background: #0b1426; color: white; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; display: flex; justify-content: space-around; padding: 20px 0; font-size: 22px; text-shadow: 2px 2px #000; }
        canvas { background: #152035; border-radius: 12px; touch-action: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .btn { width: 260px; padding: 18px; margin: 10px; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        #revive-btn { background: #22c55e; color: white; box-shadow: 0 5px 0 #166534; }
        #restart-btn { background: #ef4444; color: white; box-shadow: 0 5px 0 #991b1b; }
        #cancel-link { margin-top: 20px; color: #94a3b8; text-decoration: underline; font-size: 14px; }
    </style>
</head>
<body>
    <div id="header">
        <div style="color: #94a3b8">BEST: <span id="best" style="color:white">0</span></div>
        <div style="color: #40e0d0">SCORE: <span id="score" style="color:white">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="overlay">
        <h1 style="font-size: 45px; color: #facc15; margin: 0;">FAILED!</h1>
        <div id="final-score" style="font-size: 24px; margin-bottom: 30px;">Score: 0</div>
        <button id="revive-btn" class="btn" onclick="revivePlayer()">REVIVE (ADS)</button>
        <button id="restart-btn" class="btn" onclick="resetGame()">TRY AGAIN</button>
        <div id="cancel-link" onclick="resetGame()">Cancel & Restart</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const overlay = document.getElementById('overlay');

        let score = 0, bestScore = localStorage.getItem('bbCloneBest') || 0;
        bestEl.innerText = bestScore;

        const gridRes = 8;
        let cellSize, boardSize, boardX;
        let board = Array(gridRes).fill().map(() => Array(gridRes).fill(0));

        const COLORS = { 1: '#00d4ff', 2: '#ff2d55', 3: '#4cd964', 4: '#ffcc00', 5: '#af52de', empty: '#1e2d4a' };
        const SHAPES = [
            { map: [[1,1],[1,1]], type: 1 },
            { map: [[1,1,1,1]], type: 2 },
            { map: [[1,1,1],[0,1,0]], type: 3 },
            { map: [[1,1,1]], type: 4 },
            { map: [[1,1,0],[0,1,1]], type: 5 }
        ];

        let dock = [], activeP = null, offsetX = 0, offsetY = 0;

        function init() {
            boardSize = Math.min(window.innerWidth - 30, 420);
            cellSize = boardSize / gridRes;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            boardX = (canvas.width - boardSize) / 2;
            spawnDock();
            requestAnimationFrame(gameLoop);
        }

        function spawnDock() {
            dock = [0,1,2].map(i => {
                let s = SHAPES[Math.floor(Math.random() * SHAPES.length)];
                return { ...s, x: (canvas.width/4)*(i+1) - 40, y: boardSize + 120, ox: (canvas.width/4)*(i+1) - 40, oy: boardSize + 120, active: true };
            });
            if (!canMoveAnywhere()) showGameOver();
        }

        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const tx = touch.clientX - rect.left;
            const ty = touch.clientY - rect.top;

            dock.forEach(p => {
                if(p.active && tx > p.x - 30 && tx < p.x + 90 && ty > p.y - 30 && ty < p.y + 90) {
                    activeP = p;
                    // FIX: Offset Y by 60px so the block is visible ABOVE the thumb
                    offsetX = tx - p.x;
                    offsetY = (ty - p.y) + 60; 
                }
            });
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            if(!activeP) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            activeP.x = (touch.clientX - rect.left) - offsetX;
            activeP.y = (touch.clientY - rect.top) - offsetY;
        }, {passive: false});

        canvas.addEventListener('touchend', () => {
            if(!activeP) return;
            const gc = Math.round((activeP.x - boardX) / cellSize);
            const gr = Math.round(activeP.y / cellSize);
            
            if(canPlace(activeP.map, gr, gc)) {
                place(activeP.map, gr, gc, activeP.type);
                activeP.active = false;
                if(dock.every(d => !d.active)) spawnDock();
                checkLines();
                if (!canMoveAnywhere()) showGameOver();
            } else {
                activeP.x = activeP.ox; activeP.y = activeP.oy;
            }
            activeP = null;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw Main Grid
            for(let r=0; r<gridRes; r++) {
                for(let c=0; c<gridRes; c++) {
                    ctx.fillStyle = board[r][c] ? COLORS[board[r][c]] : COLORS.empty;
                    ctx.beginPath();
                    ctx.roundRect(boardX + c*cellSize + 2, r*cellSize + 2, cellSize - 4, cellSize - 4, 6);
                    ctx.fill();
                }
            }
            // Draw Dock (Small preview)
            dock.forEach(p => {
                if(!p.active || p === activeP) return;
                ctx.fillStyle = COLORS[p.type];
                const s = cellSize * 0.6;
                p.map.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) {
                        ctx.beginPath();
                        ctx.roundRect(p.x + ci*s, p.y + ri*s, s-2, s-2, 4);
                        ctx.fill();
                    }
                }));
            });
            // Draw Dragging Piece (Full Size + High Visibility)
            if (activeP) {
                ctx.shadowBlur = 15; ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.fillStyle = COLORS[activeP.type];
                activeP.map.forEach((row, ri) => row.forEach((v, ci) => {
                    if(v) {
                        ctx.beginPath();
                        ctx.roundRect(activeP.x + ci*cellSize, activeP.y + ri*cellSize, cellSize-2, cellSize-2, 8);
                        ctx.fill();
                    }
                }));
                ctx.shadowBlur = 0;
            }
        }

        function canPlace(map, r, c) {
            return map.every((row, ri) => row.every((v, ci) => {
                if(!v) return true;
                let nr = r + ri, nc = c + ci;
                return nr>=0 && nr<gridRes && nc>=0 && nc<gridRes && !board[nr][nc];
            }));
        }

        function place(map, r, c, type) {
            map.forEach((row, ri) => row.forEach((v, ci) => { if(v) board[r+ri][c+ci] = type; }));
            score += 10; updateScore();
        }

        function checkLines() {
            let rC = [], cC = [];
            for(let r=0; r<gridRes; r++) if(board[r].every(v => v !== 0)) rC.push(r);
            for(let c=0; c<gridRes; c++) if(board.every(r => r[c] !== 0)) cClear.push(c);
            rC.forEach(r => board[r] = Array(gridRes).fill(0));
            cC.forEach(c => board.forEach(r => r[c] = 0));
            if(rC.length || cC.length) { score += (rC.length + cC.length) * 80; updateScore(); }
        }

        function canMoveAnywhere() {
            return dock.some(p => {
                if (!p.active) return false;
                for (let r=0; r<gridRes; r++) {
                    for (let c=0; c<gridRes; c++) if (canPlace(p.map, r, c)) return true;
                }
                return false;
            });
        }

        function showGameOver() {
            document.getElementById('final-score').innerText = "Total Score: " + score;
            overlay.style.display = 'flex';
        }

        function revivePlayer() {
            alert("Ad Logic: ca-app-pub-9862002985603972/2583481675");
            for(let r=2; r<6; r++) for(let c=2; c<6; c++) board[r][c] = 0;
            overlay.style.display = 'none';
            spawnDock();
        }

        function resetGame() {
            board = Array(gridRes).fill().map(() => Array(gridRes).fill(0));
            score = 0; scoreEl.innerText = 0;
            overlay.style.display = 'none';
            spawnDock();
        }

        function updateScore() {
            scoreEl.innerText = score;
            if(score > bestScore) {
                bestScore = score; bestEl.innerText = bestScore;
                localStorage.setItem('bbCloneBest', bestScore);
            }
        }

        function gameLoop() { draw(); requestAnimationFrame(gameLoop); }
        init();
    </script>
</body>
</html>
